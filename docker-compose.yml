version: '3.8'

services:
  wecom-komari:
    image: gowfqk/wecom-komari:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wecom-komari
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # дЉБдЄЪеЊЃдњ°йЕНзљЃ
      - SENDKEY=${SENDKEY:-set_a_sendkey}
      - WECOM_CID=${WECOM_CID:-}
      - WECOM_SECRET=${WECOM_SECRET:-}
      - WECOM_AID=${WECOM_AID:-}
      - WECOM_TOUID=${WECOM_TOUID:-@all}
      - WECOM_TOKEN=${WECOM_TOKEN:-}
      - WECOM_ENCODING_AES_KEY=${WECOM_ENCODING_AES_KEY:-}
      
      # Komari йЕНзљЃ
      - KOMARI_URL=${KOMARI_URL:-}
      - KOMARI_USERNAME=${KOMARI_USERNAME:-}
      - KOMARI_PASSWORD=${KOMARI_PASSWORD:-}
      - KOMARI_API_KEY=${KOMARI_API_KEY:-}
      
      # Telegram йЕНзљЃ
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS:-}
      - TELEGRAM_API_BASE=${TELEGRAM_API_BASE:-https://api.telegram.org}
      
      # зЉУе≠ШйЕНзљЃ
      - CACHE_TYPE=${CACHE_TYPE:-none}
      - REDIS_ADDR=${REDIS_ADDR:-localhost:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wecom-komari-network

# еПѓйАЙпЉЪRedis зЉУе≠Ш
#  redis:
#    image: redis:7-alpine
#    container_name: wecom-komari-redis
#    restart: unless-stopped
#    networks:
#      - wecom-komari-network

networks:
  wecom-komari-network:
    driver: bridge
